seed: 0
device: auto
output_dir: results/sic_paper

data:
  batch_size: 130
  trajectory_length: 60
  velocity_low: -0.15
  velocity_high: 0.15
  augmentation_mode: permutation

model:
  n_units: 128
  mlp_layers: 3
  mlp_hidden_width: 256
  trainable_initial_state: true

loss:
  sigma_x: 0.05
  sigma_g: 0.4
  lambda_sep: 1.0
  lambda_inv: 0.1
  lambda_cap: 0.5
  lambda_coniso: 1.0
  pairwise_reduction: sum
  chunk_size: 512

train:
  optimizer: adamw
  scheduler: reduce_on_plateau
  scheduler_monitor: loss/total
  scheduler_factor: 0.5
  scheduler_patience: 1000
  lr: 0.00002
  weight_decay: 0.0
  grad_clip_norm: 0.1
  accumulate_grad_batches: 2
  max_optimizer_steps: 2000000
  checkpoint_every: 1000
  log_every: 10
